name: tico
description: A multi-platform Pomodoro timer app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.2.0

  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20

  path_provider: ^2.1.3
  path: ^1.9.0

  flutter_local_notifications: ^17.1.2

  audioplayers: ^6.1.0

  fl_chart: ^0.68.0

  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0

  intl: ^0.19.0

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  flutter_lints: ^4.0.0

  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/